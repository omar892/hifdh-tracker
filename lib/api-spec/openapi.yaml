openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: Quran Hifdh Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: entries
    description: Weekly entry management
  - name: stats
    description: Statistics and KPIs
  - name: qf-link
    description: Quran Foundation User-API account link (Streak Tracking integration)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Teacher login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Teacher logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{studentId}/entries/weekly:
    get:
      operationId: listWeeklyEntries
      tags: [entries]
      summary: List weekly entries for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          description: "Filter by month (YYYY-MM)"
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 52
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Weekly entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/entries/weekly/{weekStart}:
    get:
      operationId: getWeeklyEntry
      tags: [entries]
      summary: Get a specific weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      responses:
        "200":
          description: Weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertWeeklyEntry
      tags: [entries]
      summary: Create or update a weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWeeklyEntryRequest"
      responses:
        "200":
          description: Upserted weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/projections:
    get:
      operationId: getStudentProjections
      tags: [stats]
      summary: Get pace projections for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student projections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProjections"

  /students/{studentId}/stats:
    get:
      operationId: getStudentStats
      tags: [stats]
      summary: Get KPI stats for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentStats"

  /students/{studentId}/calendar:
    get:
      operationId: getStudentCalendar
      tags: [stats]
      summary: Get monthly calendar data for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          description: "Month to fetch (YYYY-MM)"
          schema:
            type: string
      responses:
        "200":
          description: Calendar data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCalendar"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [stats]
      summary: Get dashboard data for all active students
      responses:
        "200":
          description: Dashboard student list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardStudent"

  /stats/class:
    get:
      operationId: getClassStats
      tags: [stats]
      summary: Class-wide statistics
      responses:
        "200":
          description: Class stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassStats"

  /surahs:
    get:
      operationId: listSurahs
      tags: [stats]
      summary: List all 114 surahs
      responses:
        "200":
          description: Surah list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surah"

  /qf-link/status:
    get:
      operationId: getQfLinkStatus
      tags: [qf-link]
      summary: Get the current QF account link status for the program
      responses:
        "200":
          description: Link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QfLinkStatus"

  /qf-link/streak:
    get:
      operationId: getQfLinkStreak
      tags: [qf-link]
      summary: Get the program's current Quran Foundation streak
      responses:
        "200":
          description: Streak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QfLinkStreak"
        "502":
          description: Upstream QF API failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classes/current:
    get:
      operationId: getCurrentClass
      tags: [classes]
      summary: Get the current teacher's class
      responses:
        "200":
          description: Current class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassInfo"
        "404":
          description: No class found for current teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean

    QfLinkStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        displayName:
          type: string
          nullable: true
        connectedAt:
          type: string

    QfLinkStreak:
      type: object
      required: [connected, currentStreak]
      properties:
        connected:
          type: boolean
        currentStreak:
          type: integer
        longestStreak:
          type: integer
          nullable: true

    MushafPreference:
      type: string
      enum: [madani_15, indopak_15]

    Student:
      type: object
      required: [id, name, currentPage, currentLine, startDate, active, createdAt, completedJuz, mushafPreference]
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        defaultRmvAmount:
          type: string
          nullable: true
          description: Default RMV scope shown as a chip on log-week (e.g. "last 5 pages").
        defaultReviewAmount:
          type: string
          nullable: true
          description: Default Review scope shown as a chip on log-week (e.g. "1 juz").
        createdAt:
          type: string
        completedJuz:
          type: array
          items:
            type: integer

    CreateStudentRequest:
      type: object
      required: [name, currentPage, currentLine, startDate, completedJuz]
      properties:
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        defaultRmvAmount:
          type: string
          nullable: true
        defaultReviewAmount:
          type: string
          nullable: true
        completedJuz:
          type: array
          items:
            type: integer

    UpdateStudentRequest:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        defaultRmvAmount:
          type: string
          nullable: true
        defaultReviewAmount:
          type: string
          nullable: true
        completedJuz:
          type: array
          items:
            type: integer

    WeekRating:
      type: string
      enum: [excellent, strong, steady, needs_improvement, difficult_week]

    BoolArray5:
      type: array
      items:
        type: boolean
      minItems: 5
      maxItems: 5

    WeeklyEntry:
      type: object
      required: [id, studentId, weekStartDate, weekEndDate, memorizationLines, successfulDays, daysAttended, weeklyPoints, createdAt, updatedAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        memorizationLines:
          type: integer
        currentPage:
          type: integer
          nullable: true
        currentLine:
          type: integer
          nullable: true
        dailyMemorization:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyRmv:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyReview:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyAbsent:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        successfulDays:
          type: integer
        daysAttended:
          type: integer
        weeklyPoints:
          type: integer
        rmvAmount:
          type: string
          nullable: true
        reviewAmount:
          type: string
          nullable: true
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        teacherNotes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    UpsertWeeklyEntryRequest:
      type: object
      required: [dailyMemorization, dailyRmv, dailyReview, dailyAbsent]
      properties:
        memorizationLines:
          type: integer
          minimum: 0
        currentPage:
          type: integer
          nullable: true
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          nullable: true
          minimum: 1
          maximum: 15
        dailyMemorization:
          $ref: "#/components/schemas/BoolArray5"
        dailyRmv:
          $ref: "#/components/schemas/BoolArray5"
        dailyReview:
          $ref: "#/components/schemas/BoolArray5"
        dailyAbsent:
          $ref: "#/components/schemas/BoolArray5"
        rmvAmount:
          type: string
          nullable: true
        reviewAmount:
          type: string
          nullable: true
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        teacherNotes:
          type: string
          nullable: true

    StudentProjections:
      type: object
      required: [paceRecent, paceAllTime, linesRemaining6Month, linesRemainingFull, weeksTo6MonthGoal, weeksToFullQuran, trend, consistencyScore]
      properties:
        paceRecent:
          type: number
          description: Average lines/week over last 8 weeks
        paceAllTime:
          type: number
          description: Average lines/week over all time
        linesRemaining6Month:
          type: integer
          description: Lines to reach half Quran
        linesRemainingFull:
          type: integer
          description: Lines to complete full Quran
        weeksTo6MonthGoal:
          type: integer
          nullable: true
        weeksToFullQuran:
          type: integer
          nullable: true
        projectedDate6Month:
          type: string
          nullable: true
        projectedDateFull:
          type: string
          nullable: true
        trend:
          type: string
          enum: [improving, declining, stable]
        consistencyScore:
          type: number

    StudentStats:
      type: object
      required: [totalLinesMemorized, totalQuranPercentage, juzCompleted, overallSuccessRate, successRate4Weeks, currentStreakWeeks, linesThisMonth, linesLastMonth]
      properties:
        totalLinesMemorized:
          type: integer
        totalQuranPercentage:
          type: number
        juzCompleted:
          type: number
        overallSuccessRate:
          type: number
          description: All-time successful-days / attended-days ratio. Historical lens, can mask recent decline.
        successRate4Weeks:
          type: number
          description: Successful-days / attended-days over the last 4 weeks of entries. What "how is this student doing now" should answer.
        currentStreakWeeks:
          type: integer
          description: Consecutive weeks (counting back from most-recent entry) with ≥4 successful days. Returns 0 when the most-recent entry is more than 2 weeks stale.
        weeksSinceLastEntry:
          type: integer
          nullable: true
          description: How many weeks ago the most-recent entry was logged (0 = this week). null if the student has no entries at all.
        linesThisMonth:
          type: integer
        linesLastMonth:
          type: integer

    CalendarWeek:
      type: object
      required: [weekStartDate, weekEndDate, hasEntry]
      properties:
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        successfulDays:
          type: integer
          nullable: true
        daysAttended:
          type: integer
          nullable: true
        linesMemorized:
          type: integer
          nullable: true
        weeklyPoints:
          type: integer
          nullable: true
        hasEntry:
          type: boolean

    StudentCalendar:
      type: object
      required: [month, weeks, totalLines, avgSuccessfulDays, excellentWeeks]
      properties:
        month:
          type: string
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/CalendarWeek"
        totalLines:
          type: integer
        avgSuccessfulDays:
          type: number
        excellentWeeks:
          type: integer

    DashboardStudent:
      type: object
      required: [id, name, currentPage, currentLine, active, thisWeekDone, completedJuz]
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
        currentLine:
          type: integer
        active:
          type: boolean
        thisWeekDone:
          type: boolean
        thisWeekEntry:
          $ref: "#/components/schemas/WeeklyEntry"
          nullable: true
        completedJuz:
          type: array
          items:
            type: integer

    ClassInfo:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    Surah:
      type: object
      required: [number, name, nameArabic, ayahCount, juz]
      properties:
        number:
          type: integer
        name:
          type: string
        nameArabic:
          type: string
        ayahCount:
          type: integer
        juz:
          type: integer

    TrendDirection:
      type: string
      enum: [up, flat, down]

    AttentionTier:
      type: string
      enum: [concern, watch]

    AttentionFlagType:
      type: string
      enum: [no_entry, zero_attendance, rating_drop, rating_decline, low_pace]

    AttentionItem:
      type: object
      required: [studentId, name, tier, flagType, reason, focus, action]
      properties:
        studentId:
          type: integer
        name:
          type: string
        tier:
          $ref: "#/components/schemas/AttentionTier"
        flagType:
          $ref: "#/components/schemas/AttentionFlagType"
        reason:
          type: string
          description: Precise data observation in plain English ("Rating fell Strong → Steady").
        focus:
          type: string
          description: Single keyword pointing at the dimension that's slipping — "Logging", "Attendance", "Review", "New material", "Recitation", or "Pace".
        action:
          type: string
          description: One-sentence suggested next step, templated per flag type. Uses hifdh terminology (sabaq = new lesson, dohra = revision). Not personalized advice; the teacher decides.

    AttentionBorderline:
      type: object
      required: [studentId, name, hint]
      properties:
        studentId:
          type: integer
        name:
          type: string
        hint:
          type: string
          description: Why they're borderline (e.g. "attended 3/5 days").

    AttentionBlock:
      type: object
      required: [concern, watch, borderline]
      properties:
        concern:
          type: array
          items:
            $ref: "#/components/schemas/AttentionItem"
        watch:
          type: array
          items:
            $ref: "#/components/schemas/AttentionItem"
        borderline:
          type: array
          items:
            $ref: "#/components/schemas/AttentionBorderline"

    WeekRange:
      type: object
      required: [weekStartDate, weekEndDate]
      properties:
        weekStartDate:
          type: string
          description: ISO date of this week's Monday.
        weekEndDate:
          type: string
          description: ISO date of this week's Friday.

    Verdict:
      type: object
      required: [paceTrend, qualityTrend, concernCount, watchCount, mostUrgentName, sentence]
      properties:
        paceTrend:
          $ref: "#/components/schemas/TrendDirection"
        qualityTrend:
          $ref: "#/components/schemas/TrendDirection"
        concernCount:
          type: integer
        watchCount:
          type: integer
        mostUrgentName:
          type: string
          nullable: true
        sentence:
          type: string
          description: One-sentence narrative summary composed server-side from the trends and flag counts.

    PaceCard:
      type: object
      required: [thisWeek, avg4Week, delta, sparkline]
      properties:
        thisWeek:
          type: number
          description: Lines per student this week.
        avg4Week:
          type: number
          description: Lines per student per week, averaged over the last 4 calendar weeks.
        delta:
          type: number
          description: thisWeek minus avg4Week.
        sparkline:
          type: array
          description: 8-week sparkline (oldest → newest) of lines per student per week.
          items:
            type: number

    RatingMix:
      type: object
      required: [excellent, strong, steady, needs_improvement, difficult_week]
      properties:
        excellent:
          type: integer
        strong:
          type: integer
        steady:
          type: integer
        needs_improvement:
          type: integer
        difficult_week:
          type: integer

    QualityCard:
      type: object
      required: [strongOrAbove, totalRated, mix, deltaStrongOrAbove]
      properties:
        strongOrAbove:
          type: integer
          description: Count of this week's entries rated Strong or Excellent.
        totalRated:
          type: integer
          description: Total entries this week that have a rating.
        mix:
          $ref: "#/components/schemas/RatingMix"
        deltaStrongOrAbove:
          type: integer
          description: Week-over-week change in the Strong-or-above count.

    AttendanceCard:
      type: object
      required: [percentThisWeek, avgDaysOfFive, loggedCount, totalStudents]
      properties:
        percentThisWeek:
          type: integer
          nullable: true
          description: Attendance % this week — null when no students have logged yet.
        avgDaysOfFive:
          type: number
          description: Average days attended (out of 5) across logged students.
        loggedCount:
          type: integer
        totalStudents:
          type: integer

    ClassPulse:
      type: object
      required: [pace, quality, attendance]
      properties:
        pace:
          $ref: "#/components/schemas/PaceCard"
        quality:
          $ref: "#/components/schemas/QualityCard"
        attendance:
          $ref: "#/components/schemas/AttendanceCard"

    RosterStatus:
      type: string
      enum: [concern, watch, fine]

    RosterRow:
      type: object
      required: [studentId, name, status, juzCount, currentPage, pace4Week]
      properties:
        studentId:
          type: integer
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        status:
          $ref: "#/components/schemas/RosterStatus"
        juzCount:
          type: integer
        currentPage:
          type: integer
          description: 1–604; used for the progress bar toward 30 juz.
        pace4Week:
          type: number
          description: Lines per week, averaged over the last 4 calendar weeks.
        paceTrend:
          allOf: [{ $ref: "#/components/schemas/TrendDirection" }]
          nullable: true
          description: Null when there isn't enough prior data to compute a trend.
        thisWeekRating:
          type: string
          nullable: true
        ratingTrend:
          allOf: [{ $ref: "#/components/schemas/TrendDirection" }]
          nullable: true
        daysAttended:
          type: integer
          nullable: true
          description: Days attended this week (0–5); null when no entry yet.

    StreakItem:
      type: object
      required: [studentId, name, currentStreak, best12Week]
      properties:
        studentId:
          type: integer
        name:
          type: string
        currentStreak:
          type: integer
          description: Consecutive weeks of perfect (5/5) attendance, stale-aware.
        best12Week:
          type: integer
          description: Longest perfect-attendance run in the last 12 weeks.

    MilestoneItem:
      type: object
      required: [studentId, name, juzNumber, completedAt]
      properties:
        studentId:
          type: integer
        name:
          type: string
        juzNumber:
          type: integer
        completedAt:
          type: string
          description: ISO timestamp when the juz was marked complete.

    ClassTotals:
      type: object
      required: [totalLinesMemorized, totalJuzCompleted]
      properties:
        totalLinesMemorized:
          type: integer
        totalJuzCompleted:
          type: integer

    Celebrations:
      type: object
      required: [streaks, milestonesThisWeek, classTotals]
      properties:
        streaks:
          type: array
          items:
            $ref: "#/components/schemas/StreakItem"
        milestonesThisWeek:
          type: array
          items:
            $ref: "#/components/schemas/MilestoneItem"
        classTotals:
          $ref: "#/components/schemas/ClassTotals"

    ClassStats:
      type: object
      required: [weekRange, verdict, attention, classPulse, roster, celebrations]
      properties:
        weekRange:
          $ref: "#/components/schemas/WeekRange"
        verdict:
          $ref: "#/components/schemas/Verdict"
        attention:
          $ref: "#/components/schemas/AttentionBlock"
        classPulse:
          $ref: "#/components/schemas/ClassPulse"
        roster:
          type: array
          items:
            $ref: "#/components/schemas/RosterRow"
        celebrations:
          $ref: "#/components/schemas/Celebrations"
