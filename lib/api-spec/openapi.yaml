openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: Quran Hifdh Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: entries
    description: Weekly entry management
  - name: stats
    description: Statistics and KPIs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Teacher login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Teacher logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{studentId}/entries/weekly:
    get:
      operationId: listWeeklyEntries
      tags: [entries]
      summary: List weekly entries for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          description: "Filter by month (YYYY-MM)"
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 52
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Weekly entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/entries/weekly/{weekStart}:
    get:
      operationId: getWeeklyEntry
      tags: [entries]
      summary: Get a specific weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      responses:
        "200":
          description: Weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertWeeklyEntry
      tags: [entries]
      summary: Create or update a weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWeeklyEntryRequest"
      responses:
        "200":
          description: Upserted weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/projections:
    get:
      operationId: getStudentProjections
      tags: [stats]
      summary: Get pace projections for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student projections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProjections"

  /students/{studentId}/stats:
    get:
      operationId: getStudentStats
      tags: [stats]
      summary: Get KPI stats for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentStats"

  /students/{studentId}/calendar:
    get:
      operationId: getStudentCalendar
      tags: [stats]
      summary: Get monthly calendar data for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          description: "Month to fetch (YYYY-MM)"
          schema:
            type: string
      responses:
        "200":
          description: Calendar data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCalendar"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [stats]
      summary: Get dashboard data for all active students
      responses:
        "200":
          description: Dashboard student list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardStudent"

  /stats/class:
    get:
      operationId: getClassStats
      tags: [stats]
      summary: Class-wide statistics
      responses:
        "200":
          description: Class stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassStats"

  /surahs:
    get:
      operationId: listSurahs
      tags: [stats]
      summary: List all 114 surahs
      responses:
        "200":
          description: Surah list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surah"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean

    MushafPreference:
      type: string
      enum: [madani_15, indopak_15]

    Student:
      type: object
      required: [id, name, currentPage, currentLine, startDate, active, createdAt, completedJuz, mushafPreference]
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        createdAt:
          type: string
        completedJuz:
          type: array
          items:
            type: integer

    CreateStudentRequest:
      type: object
      required: [name, currentPage, currentLine, startDate, completedJuz]
      properties:
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        completedJuz:
          type: array
          items:
            type: integer

    UpdateStudentRequest:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          minimum: 1
          maximum: 15
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean
        mushafPreference:
          $ref: "#/components/schemas/MushafPreference"
        completedJuz:
          type: array
          items:
            type: integer

    WeekRating:
      type: string
      enum: [excellent, strong, steady, needs_improvement, difficult_week]

    BoolArray5:
      type: array
      items:
        type: boolean
      minItems: 5
      maxItems: 5

    WeeklyEntry:
      type: object
      required: [id, studentId, weekStartDate, weekEndDate, memorizationLines, successfulDays, daysAttended, weeklyPoints, createdAt, updatedAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        memorizationLines:
          type: integer
        currentPage:
          type: integer
          nullable: true
        currentLine:
          type: integer
          nullable: true
        dailySabaq:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyRmv:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyReview:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        dailyAbsent:
          $ref: "#/components/schemas/BoolArray5"
          nullable: true
        successfulDays:
          type: integer
        daysAttended:
          type: integer
        weeklyPoints:
          type: integer
        rmvAmount:
          type: string
          nullable: true
        reviewAmount:
          type: string
          nullable: true
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        teacherNotes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    UpsertWeeklyEntryRequest:
      type: object
      required: [dailySabaq, dailyRmv, dailyReview, dailyAbsent]
      properties:
        memorizationLines:
          type: integer
          minimum: 0
        currentPage:
          type: integer
          nullable: true
          minimum: 1
          maximum: 604
        currentLine:
          type: integer
          nullable: true
          minimum: 1
          maximum: 15
        dailySabaq:
          $ref: "#/components/schemas/BoolArray5"
        dailyRmv:
          $ref: "#/components/schemas/BoolArray5"
        dailyReview:
          $ref: "#/components/schemas/BoolArray5"
        dailyAbsent:
          $ref: "#/components/schemas/BoolArray5"
        rmvAmount:
          type: string
          nullable: true
        reviewAmount:
          type: string
          nullable: true
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        teacherNotes:
          type: string
          nullable: true

    StudentProjections:
      type: object
      required: [paceRecent, paceAllTime, linesRemaining6Month, linesRemainingFull, weeksTo6MonthGoal, weeksToFullQuran, trend, consistencyScore]
      properties:
        paceRecent:
          type: number
          description: Average lines/week over last 8 weeks
        paceAllTime:
          type: number
          description: Average lines/week over all time
        linesRemaining6Month:
          type: integer
          description: Lines to reach half Quran
        linesRemainingFull:
          type: integer
          description: Lines to complete full Quran
        weeksTo6MonthGoal:
          type: integer
          nullable: true
        weeksToFullQuran:
          type: integer
          nullable: true
        projectedDate6Month:
          type: string
          nullable: true
        projectedDateFull:
          type: string
          nullable: true
        trend:
          type: string
          enum: [improving, declining, stable]
        consistencyScore:
          type: number

    StudentStats:
      type: object
      required: [totalLinesMemorized, totalQuranPercentage, juzCompleted, overallSuccessRate, successRate4Weeks, currentStreakWeeks, linesThisMonth, linesLastMonth]
      properties:
        totalLinesMemorized:
          type: integer
        totalQuranPercentage:
          type: number
        juzCompleted:
          type: number
        overallSuccessRate:
          type: number
          description: All-time successful-days / attended-days ratio. Historical lens, can mask recent decline.
        successRate4Weeks:
          type: number
          description: Successful-days / attended-days over the last 4 weeks of entries. What "how is this student doing now" should answer.
        currentStreakWeeks:
          type: integer
          description: Consecutive weeks (counting back from most-recent entry) with ≥4 successful days. Returns 0 when the most-recent entry is more than 2 weeks stale.
        weeksSinceLastEntry:
          type: integer
          nullable: true
          description: How many weeks ago the most-recent entry was logged (0 = this week). null if the student has no entries at all.
        linesThisMonth:
          type: integer
        linesLastMonth:
          type: integer

    CalendarWeek:
      type: object
      required: [weekStartDate, weekEndDate, hasEntry]
      properties:
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        successfulDays:
          type: integer
          nullable: true
        daysAttended:
          type: integer
          nullable: true
        linesMemorized:
          type: integer
          nullable: true
        weeklyPoints:
          type: integer
          nullable: true
        hasEntry:
          type: boolean

    StudentCalendar:
      type: object
      required: [month, weeks, totalLines, avgSuccessfulDays, excellentWeeks]
      properties:
        month:
          type: string
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/CalendarWeek"
        totalLines:
          type: integer
        avgSuccessfulDays:
          type: number
        excellentWeeks:
          type: integer

    DashboardStudent:
      type: object
      required: [id, name, currentPage, currentLine, active, thisWeekDone, completedJuz]
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
          nullable: true
          enum: [male, female]
        currentPage:
          type: integer
        currentLine:
          type: integer
        active:
          type: boolean
        thisWeekDone:
          type: boolean
        thisWeekEntry:
          $ref: "#/components/schemas/WeeklyEntry"
          nullable: true
        completedJuz:
          type: array
          items:
            type: integer

    NotYetLogged:
      type: object
      required: [studentId, name]
      properties:
        studentId:
          type: integer
        name:
          type: string

    ClassWeekStatus:
      type: object
      required: [thisWeekMonday, weekPhase, unloggedCount, totalStudents, allUnlogged]
      properties:
        thisWeekMonday:
          type: string
          description: ISO date of this week's Monday.
        weekPhase:
          type: string
          enum: [early, mid, late]
          description: early = Mon-Wed (not logging yet is normal), mid = Thu (gentle nudge), late = Fri+ (should escalate).
        unloggedCount:
          type: integer
        totalStudents:
          type: integer
        allUnlogged:
          type: boolean
          description: True when no student has logged for this week. UI uses this to collapse per-student warnings into one class-level message.

    ClassStats:
      type: object
      required: [totalStudents, averageSuccessRate, averageSuccessRate4Weeks, totalLinesMemorized, avgLinesPerWeek, avgLinesPerWeek4Weeks, topPerformers, needsAttention, studentProgress, studentRankings, attentionFlags, weeklyTrends, streakLeaderboard, linesThisMonth, linesLastMonth, activeStudentsThisMonth, activeStudentsLastMonth, avgLinesPerStudentThisMonth, avgLinesPerStudentLastMonth, spotlights, monthlyDecomposition, ratingDistributions, thisWeekSummary, absentStudents, notYetLogged, classWeekStatus]
      properties:
        totalStudents:
          type: integer
        averageSuccessRate:
          type: number
          description: All-time average success rate across students. Historical lens.
        averageSuccessRate4Weeks:
          type: number
          description: Average success rate over the last 4 weeks. Only counts students who logged at least one entry in that window.
        totalLinesMemorized:
          type: integer
        avgLinesPerWeek4Weeks:
          type: number
          description: Average lines per student per week, scoped to last 4 weeks.
        avgLinesPerWeek:
          type: number
        topPerformers:
          type: array
          items:
            $ref: "#/components/schemas/StudentPerformance"
        needsAttention:
          type: array
          items:
            $ref: "#/components/schemas/StudentPerformance"
        studentProgress:
          type: array
          items:
            $ref: "#/components/schemas/StudentProgress"
        studentRankings:
          type: array
          items:
            $ref: "#/components/schemas/StudentRanking"
        attentionFlags:
          type: array
          items:
            $ref: "#/components/schemas/StudentAttention"
        weeklyTrends:
          type: array
          items:
            $ref: "#/components/schemas/WeekTrend"
        streakLeaderboard:
          type: array
          items:
            $ref: "#/components/schemas/StudentStreak"
        linesThisMonth:
          type: integer
        linesLastMonth:
          type: integer
        activeStudentsThisMonth:
          type: integer
        activeStudentsLastMonth:
          type: integer
        avgLinesPerStudentThisMonth:
          type: number
        avgLinesPerStudentLastMonth:
          type: number
        spotlights:
          type: array
          items:
            $ref: "#/components/schemas/StudentSpotlight"
        monthlyDecomposition:
          $ref: "#/components/schemas/MonthlyDecomposition"
        ratingDistributions:
          type: array
          items:
            $ref: "#/components/schemas/RatingDistributionWeek"
        thisWeekSummary:
          $ref: "#/components/schemas/ThisWeekSummary"
        absentStudents:
          type: array
          items:
            $ref: "#/components/schemas/AbsentStudent"
        notYetLogged:
          type: array
          items:
            $ref: "#/components/schemas/NotYetLogged"
        classWeekStatus:
          $ref: "#/components/schemas/ClassWeekStatus"

    StudentPerformance:
      type: object
      required: [studentId, name, successRate]
      properties:
        studentId:
          type: integer
        name:
          type: string
        successRate:
          type: number

    StudentProgress:
      type: object
      required: [studentId, name, totalLines, totalJuz, weeklyPace]
      properties:
        studentId:
          type: integer
        name:
          type: string
        totalLines:
          type: integer
        totalJuz:
          type: number
        weeklyPace:
          type: number

    StudentRanking:
      type: object
      required: [studentId, name, compositeScore, successRate, weeklyPace, consistency]
      properties:
        studentId:
          type: integer
        name:
          type: string
        compositeScore:
          type: number
        successRate:
          type: number
        weeklyPace:
          type: number
        consistency:
          type: number

    AttentionFlag:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
        label:
          type: string

    StudentAttention:
      type: object
      required: [studentId, name, flags]
      properties:
        studentId:
          type: integer
        name:
          type: string
        flags:
          type: array
          items:
            $ref: "#/components/schemas/AttentionFlag"

    WeekTrend:
      type: object
      required: [weekStart, avgSuccessRate, totalLines, avgRating]
      properties:
        weekStart:
          type: string
        avgSuccessRate:
          type: number
        totalLines:
          type: integer
        avgRating:
          type: number

    StudentStreak:
      type: object
      required: [studentId, name, currentStreak, best12WeekStreak]
      properties:
        studentId:
          type: integer
        name:
          type: string
        currentStreak:
          type: integer
          description: Stale-aware — returns 0 if the most-recent entry is more than 2 weeks old.
        best12WeekStreak:
          type: integer
        weeksSinceLastEntry:
          type: integer
          nullable: true

    Surah:
      type: object
      required: [number, name, nameArabic, ayahCount, juz]
      properties:
        number:
          type: integer
        name:
          type: string
        nameArabic:
          type: string
        ayahCount:
          type: integer
        juz:
          type: integer

    StudentSpotlight:
      type: object
      required: [studentId, name, insightText, type, category]
      properties:
        studentId:
          type: integer
        name:
          type: string
        insightText:
          type: string
        type:
          type: string
          enum: [big_increase, first_excellent, personal_record, milestone_page, perfect_streak, big_drop, streak_break, rating_drop]
        category:
          type: string
          enum: [positive, concern]

    MonthlyContributor:
      type: object
      required: [studentId, name, linesDelta]
      properties:
        studentId:
          type: integer
        name:
          type: string
        linesDelta:
          type: integer

    MonthlyDecomposition:
      type: object
      required: [schoolDaysThisMonth, schoolDaysLastMonth, linesPerSchoolDayThisMonth, linesPerSchoolDayLastMonth, biggestContributors]
      properties:
        schoolDaysThisMonth:
          type: integer
        schoolDaysLastMonth:
          type: integer
        linesPerSchoolDayThisMonth:
          type: number
        linesPerSchoolDayLastMonth:
          type: number
        biggestContributors:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyContributor"

    RatingDistributionWeek:
      type: object
      required: [weekStart, counts]
      properties:
        weekStart:
          type: string
        counts:
          type: object
          required: [excellent, strong, steady, needs_improvement, difficult_week]
          properties:
            excellent:
              type: integer
            strong:
              type: integer
            steady:
              type: integer
            needs_improvement:
              type: integer
            difficult_week:
              type: integer

    ThisWeekSummary:
      type: object
      required: [totalClassLines, avgLinesPerStudent, bestWeekLinesThisMonth]
      properties:
        totalClassLines:
          type: integer
        avgLinesPerStudent:
          type: number
        bestWeekLinesThisMonth:
          type: integer

    AbsentStudent:
      type: object
      required: [studentId, name, daysAttended]
      properties:
        studentId:
          type: integer
        name:
          type: string
        daysAttended:
          type: integer
