openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Quran Hifdh Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: entries
    description: Weekly entry management
  - name: stats
    description: Statistics and KPIs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Teacher login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Teacher logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{studentId}/entries/weekly:
    get:
      operationId: listWeeklyEntries
      tags: [entries]
      summary: List weekly entries for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          description: "Filter by month (YYYY-MM)"
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 52
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Weekly entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/entries/weekly/{weekStart}:
    get:
      operationId: getWeeklyEntry
      tags: [entries]
      summary: Get a specific weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      responses:
        "200":
          description: Weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertWeeklyEntry
      tags: [entries]
      summary: Create or update a weekly entry
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: weekStart
          in: path
          required: true
          description: "Monday date (YYYY-MM-DD)"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWeeklyEntryRequest"
      responses:
        "200":
          description: Upserted weekly entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyEntry"

  /students/{studentId}/stats:
    get:
      operationId: getStudentStats
      tags: [stats]
      summary: Get KPI stats for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentStats"

  /students/{studentId}/calendar:
    get:
      operationId: getStudentCalendar
      tags: [stats]
      summary: Get monthly calendar data for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          description: "Month to fetch (YYYY-MM)"
          schema:
            type: string
      responses:
        "200":
          description: Calendar data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCalendar"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [stats]
      summary: Get dashboard data for all active students
      responses:
        "200":
          description: Dashboard student list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardStudent"

  /stats/class:
    get:
      operationId: getClassStats
      tags: [stats]
      summary: Class-wide statistics
      responses:
        "200":
          description: Class stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassStats"

  /surahs:
    get:
      operationId: listSurahs
      tags: [stats]
      summary: List all 114 surahs
      responses:
        "200":
          description: Surah list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surah"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean

    Student:
      type: object
      required: [id, name, currentSurah, currentAyah, startDate, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        currentSurah:
          type: integer
        currentAyah:
          type: integer
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string

    CreateStudentRequest:
      type: object
      required: [name, currentSurah, currentAyah, startDate]
      properties:
        name:
          type: string
        currentSurah:
          type: integer
        currentAyah:
          type: integer
        startDate:
          type: string
        notes:
          type: string
          nullable: true

    UpdateStudentRequest:
      type: object
      properties:
        name:
          type: string
        currentSurah:
          type: integer
        currentAyah:
          type: integer
        startDate:
          type: string
        notes:
          type: string
          nullable: true
        active:
          type: boolean

    WeekRating:
      type: string
      enum: [excellent, strong, steady, needs_improvement, difficult_week]

    Quality:
      type: string
      enum: [excellent, good, needs_repeat, incomplete]

    WeeklyEntry:
      type: object
      required: [id, studentId, weekStartDate, weekEndDate, ayahsMemorized, successfulDays, daysAttended, createdAt, updatedAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        newMemFromSurah:
          type: integer
          nullable: true
        newMemFromAyah:
          type: integer
          nullable: true
        newMemToSurah:
          type: integer
          nullable: true
        newMemToAyah:
          type: integer
          nullable: true
        ayahsMemorized:
          type: integer
        successfulDays:
          type: integer
        daysAttended:
          type: integer
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        rmvQuality:
          $ref: "#/components/schemas/Quality"
          nullable: true
        reviewQuality:
          $ref: "#/components/schemas/Quality"
          nullable: true
        teacherNotes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    UpsertWeeklyEntryRequest:
      type: object
      required: [successfulDays, daysAttended]
      properties:
        newMemFromSurah:
          type: integer
          nullable: true
        newMemFromAyah:
          type: integer
          nullable: true
        newMemToSurah:
          type: integer
          nullable: true
        newMemToAyah:
          type: integer
          nullable: true
        successfulDays:
          type: integer
          minimum: 0
          maximum: 5
        daysAttended:
          type: integer
          minimum: 0
          maximum: 5
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        rmvQuality:
          $ref: "#/components/schemas/Quality"
          nullable: true
        reviewQuality:
          $ref: "#/components/schemas/Quality"
          nullable: true
        teacherNotes:
          type: string
          nullable: true

    StudentStats:
      type: object
      required: [totalAyahsMemorized, totalQuranPercentage, juzCompleted, overallSuccessRate, currentStreakWeeks, ayahsThisMonth, ayahsLastMonth]
      properties:
        totalAyahsMemorized:
          type: integer
        totalQuranPercentage:
          type: number
        juzCompleted:
          type: number
        overallSuccessRate:
          type: number
        currentStreakWeeks:
          type: integer
        ayahsThisMonth:
          type: integer
        ayahsLastMonth:
          type: integer

    CalendarWeek:
      type: object
      required: [weekStartDate, weekEndDate, hasEntry]
      properties:
        weekStartDate:
          type: string
        weekEndDate:
          type: string
        weekRating:
          $ref: "#/components/schemas/WeekRating"
          nullable: true
        successfulDays:
          type: integer
          nullable: true
        daysAttended:
          type: integer
          nullable: true
        ayahsMemorized:
          type: integer
          nullable: true
        hasEntry:
          type: boolean

    StudentCalendar:
      type: object
      required: [month, weeks, totalAyahs, avgSuccessfulDays, excellentWeeks]
      properties:
        month:
          type: string
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/CalendarWeek"
        totalAyahs:
          type: integer
        avgSuccessfulDays:
          type: number
        excellentWeeks:
          type: integer

    DashboardStudent:
      type: object
      required: [id, name, currentSurah, currentAyah, active, thisWeekDone]
      properties:
        id:
          type: integer
        name:
          type: string
        currentSurah:
          type: integer
        currentAyah:
          type: integer
        active:
          type: boolean
        thisWeekDone:
          type: boolean
        thisWeekEntry:
          $ref: "#/components/schemas/WeeklyEntry"
          nullable: true

    ClassStats:
      type: object
      required: [totalStudents, averageSuccessRate, totalAyahsMemorized, avgAyahsPerWeek, topPerformers, needsAttention]
      properties:
        totalStudents:
          type: integer
        averageSuccessRate:
          type: number
        totalAyahsMemorized:
          type: integer
        avgAyahsPerWeek:
          type: number
        topPerformers:
          type: array
          items:
            $ref: "#/components/schemas/StudentPerformance"
        needsAttention:
          type: array
          items:
            $ref: "#/components/schemas/StudentPerformance"

    StudentPerformance:
      type: object
      required: [studentId, name, successRate]
      properties:
        studentId:
          type: integer
        name:
          type: string
        successRate:
          type: number

    Surah:
      type: object
      required: [number, name, nameArabic, ayahCount, juz]
      properties:
        number:
          type: integer
        name:
          type: string
        nameArabic:
          type: string
        ayahCount:
          type: integer
        juz:
          type: integer
