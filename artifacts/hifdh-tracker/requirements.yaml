packages:
  "framer-motion": "For page transitions, swipe animations, and interactive elements"
  "recharts": "For the class-wide and weekly trend statistics charts"
  "date-fns": "For elegant date manipulation, formatting, and calendar grid generation"
  "lucide-react": "For beautiful consistent iconography across the application"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For safely merging Tailwind utility classes without conflicts"
  "@hookform/resolvers": "For robust Zod form validation"
  "react-hook-form": "For managing complex daily entry form state"
  "zod": "For strict schema validation on the frontend forms"

images:
