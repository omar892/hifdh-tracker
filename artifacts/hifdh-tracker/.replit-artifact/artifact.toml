kind = "web"
previewPath = "/"
title = "Quran Hifdh Tracker"
version = "1.0.0"
id = "artifacts/hifdh-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23919
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hifdh-tracker run dev"

[services.env]
PORT = "23919"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hifdh-tracker", "run", "build"]
publicDir = "artifacts/hifdh-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
